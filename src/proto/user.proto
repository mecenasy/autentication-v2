syntax = "proto3";

package user;

service UserProxyService {
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  rpc CreateSocialUser (CreateSocialUserRequest) returns (SocialUserResponse);
  rpc CheckExist(CheckExistRequest) returns (CheckExistResponse);
  rpc FindUserById(FindUserByIdRequest) returns (UserResponse);
  rpc FindSocialUser(FindSocialUserRequest) returns (UserResponse);
  rpc FindUser(FindUserRequest) returns (UserResponse);
}

message CreateUserRequest {
  string email = 1;
  string phone = 2;
  string password = 3;
}

message CreateSocialUserRequest {
  string email = 1;
  string provider = 2;
  string providerId = 3;
}

message UserResponse {
  string id = 1;
  string email = 2;
  string phone = 3;
}

message SocialUserResponse {
  string id = 1;
  string email = 2;
}

message CheckExistRequest {
  string email = 1;
}

message CheckExistResponse {
  bool exist = 1;
}

message FindUserByIdRequest {
  string id = 1;
}

message FindUserRequest {
  string email = 1;
}

message FindSocialUserRequest {
  string provider = 1;
  string providerId = 2;
  string email = 3;
  string name = 4;
}