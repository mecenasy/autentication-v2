syntax = "proto3";

package login;

service LoginProxyService {
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc GetLoginStatus (LoginStatusRequest) returns (LoginStatusResponse);
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  optional string phone = 3;
  optional bool is2fa = 4;
  optional string userId = 5;
}

message LoginStatusRequest {
  string userId = 1;
}

message LoginStatusResponse {
  oneof user {
    string message = 1;
    UserStatus userStatus = 2;
  }
}

message UserStatus {
  bool admin = 1;
  string email = 2;
  bool isAdaptive = 3;
  bool is2fa = 4;
}